version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: LifeLink_mysql
    environment:
      MYSQL_ROOT_PASSWORD: LifeLink123
      MYSQL_DATABASE: LifeLink_dev
      MYSQL_USER: LifeLink
      MYSQL_PASSWORD: LifeLink_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seeds/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - LifeLink_network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: LifeLink_backend
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: LifeLink_dev
      DB_USER: LifeLink
      DB_PASSWORD: LifeLink_pass
      JWT_SECRET: your_super_secret_jwt_key_change_this_in_production
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - LifeLink_network
    command: npm run dev

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: LifeLink_frontend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_APP_NAME: LifeLink
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - LifeLink_network
    command: npm run dev

volumes:
  mysql_data:
    driver: local

networks:
  LifeLink_network:
    driver: bridge

